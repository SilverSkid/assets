<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Silverfox Workshop | Assets</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: #fff; padding: 40px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .card { background: #1e1e1e; border: 1px solid #333; padding: 20px; border-radius: 12px; text-align: center; }
        img { width: 150px; height: 150px; object-fit: contain; margin-bottom: 15px; background: #2a2a2a; padding: 10px; border-radius: 8px; }
        code { display: block; background: #000; padding: 10px; font-size: 0.75rem; border-radius: 4px; cursor: pointer; color: #00ff00; }
    </style>
</head>
<body>
    <h1>Brand Asset Manager</h1>
    <div class="grid" id="gallery">Loading assets...</div>

    <script>
        // Replace with your info
        const username = 'SilverSkid';
        const repo = 'assets';
        const pagesUrl = 'https://assets.jbunn2001.workers.dev'; // Replace with your ACTUAL .pages.dev URL

        async function loadAssets() {
            const response = await fetch(`https://api.github.com/repos/${username}/${repo}/contents/`);
            const files = await response.json();
            const gallery = document.getElementById('gallery');
            gallery.innerHTML = '';

            files.forEach(file => {
                if (file.name.endsWith('.svg') || file.name.endsWith('.png')) {
                    const card = document.createElement('div');
                    card.className = 'card';
                    const fullUrl = `${pagesUrl}/${file.name}`;
                    card.innerHTML = `
                        <img src="${file.name}">
                        <p>${file.name}</p>
                        <code onclick="navigator.clipboard.writeText('${fullUrl}')">Copy CDN URL</code>
                    `;
                    gallery.appendChild(card);
                }
            });
        }
        loadAssets();
    </script>
</body>
</html>
