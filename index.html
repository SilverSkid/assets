<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Silverfox Workshop | Asset Gallery</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: #eee; padding: 2rem; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .card { background: #2a2a2a; border: 1px solid #444; padding: 15px; border-radius: 8px; text-align: center; }
        img { max-width: 100%; height: auto; border-radius: 4px; margin-bottom: 10px; background: #333; }
        code { display: block; background: #000; padding: 5px; font-size: 0.8rem; word-break: break-all; margin-top: 10px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Brand Assets</h1>
    <div class="grid">
        <div class="card">
            <img src="logo.png" alt="Logo">
            <strong>logo.png</strong>
            <code onclick="navigator.clipboard.writeText(window.location.href + 'logo.png')">Click to copy URL</code>
        </div>

        </div>
    <script>
        console.log("Gallery Loaded. URLs point to: " + window.location.href);
    </script>
</body>
</html>
